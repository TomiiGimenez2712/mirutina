<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <!-- Etiquetas Meta para la Pantalla de Inicio de Apple (iOS) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Rutina">
    <!-- iOS requiere obligatoriamente un formato PNG para el ícono de inicio -->
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="icon" type="image/svg+xml" href="logo.svg">

    <title>Mi Rutina</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=2">
    <!-- Lógica de animación de confeti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>

<body>
    <header>
        <div class="header-top">
            <img src="logo.svg" alt="Logo de Rutina" class="app-logo">
            <h1>Mi <span>Rutina</span></h1>
            <div style="flex:1"></div>
            <!-- Botón para ver las estadísticas y la racha de entrenamiento -->
            <button id="stats-btn" class="stats-btn" onclick="openStatsModal()">
                <span id="streak-count">0</span>&nbsp;🔥
            </button>
        </div>

        <!-- Pestañas para seleccionar el día de la rutina -->
        <div class="day-selector" id="day-selector">
            <!-- Los botones se generan dinámicamente desde JavaScript -->
        </div>

        <!-- Barra superior de progreso diario -->
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
    </header>

    <main id="routine-container">
        <!-- El contenido de los ejercicios se renderiza dinámicamente aquí -->
    </main>

    <!-- Ventana Emergente (Modal) de Estadísticas -->
    <div id="stats-modal" class="modal hidden">
        <div class="modal-backdrop" onclick="closeStatsModal()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>Tu Actividad</h3>
                <button class="close-btn" onclick="closeStatsModal()">&times;</button>
            </div>

            <div class="stats-summary">
                <div class="stat-box">
                    <span class="stat-value" id="modal-streak">0</span>
                    <span class="stat-label">Semanas Seguidas</span>
                </div>
                <div class="stat-box">
                    <span class="stat-value" id="modal-workouts">0</span>
                    <span class="stat-label">Días Entrenados</span>
                </div>
            </div>

            <!-- Selector de rango temporal segmentado -->
            <div class="range-selector-container">
                <span class="range-label">Rango de actividad:</span>
                <div class="range-segmented-control">
                    <button id="range-btn-28d" class="range-segment-btn" onclick="changeStatsRange('28d')">28d</button>
                    <button id="range-btn-3m" class="range-segment-btn" onclick="changeStatsRange('3m')">3m</button>
                    <button id="range-btn-1y" class="range-segment-btn" onclick="changeStatsRange('1y')">1y</button>
                    <button id="range-btn-all" class="range-segment-btn" onclick="changeStatsRange('all')">Todo</button>
                </div>
            </div>

            <!-- Cuadrícula visual de actividad semanal -->
            <div class="activity-grid" id="activity-grid">
                <!-- Los cuadros de actividad se generan dinámicamente desde JavaScript -->
            </div>

            <!-- Sección de configuración de rutina activa (escondida dentro del modal) -->
            <div class="settings-section">
                <h4>Rutina Activa</h4>
                <div class="segmented-control">
                    <button id="routine-btn-nueva" class="segment-btn"
                        onclick="switchRoutine('nueva')">Compuesta</button>
                    <button id="routine-btn-anterior" class="segment-btn"
                        onclick="switchRoutine('anterior')">Aislada</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Archivo principal de lógica del programa -->
    <script src="app.js?v=2"></script>
</body>

</html>
